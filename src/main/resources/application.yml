spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/luckydna}
    username: ${SPRING_DATASOURCE_USERNAME:luckydna}
    password: ${SPRING_DATASOURCE_PASSWORD:luckydna}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}

info:
  app:
    name: LuckyDNA API
    company: The Snell AI Group LLC
    version: 0.0.1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: when_authorized

  info:
    env:
      enabled: true