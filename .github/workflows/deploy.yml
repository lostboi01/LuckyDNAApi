name: Deploy LuckyDNAApi

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Prepare deploy artifact
        run: |
          mkdir -p deploy
          cp target/*.jar deploy/luckydna-api.jar

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          if [ -z "${{ secrets.AWS_HOST }}" ]; then
            echo "AWS_HOST secret is missing"
            exit 1
          fi

          if [ -z "${{ secrets.AWS_USER }}" ]; then
            echo "AWS_USER secret is missing"
            exit 1
          fi

          if [ -z "${{ secrets.AWS_SSH_PRIVATE_KEY }}" ]; then
            echo "AWS_SSH_PRIVATE_KEY secret is missing"
            exit 1
          fi

          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/luckydna_aws_key
          chmod 600 ~/.ssh/luckydna_aws_key
          ssh-keyscan -H "${{ secrets.AWS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload JAR to EC2
        run: |
          scp -i ~/.ssh/luckydna_aws_key \
            deploy/luckydna-api.jar \
            ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }}:/tmp/luckydna-api.jar

      - name: Restart LuckyDNAApi
        run: |
          ssh -i ~/.ssh/luckydna_aws_key \
            ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} << 'EOF'
              sudo systemctl stop luckydna-api || true
              sudo cp /tmp/luckydna-api.jar /opt/luckydna-api/luckydna-api.jar
              sudo chown luckydna:luckydna /opt/luckydna-api/luckydna-api.jar
              sudo systemctl start luckydna-api
              sudo systemctl status luckydna-api --no-pager
          EOF
