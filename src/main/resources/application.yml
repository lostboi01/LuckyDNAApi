spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/luckydna
    username: luckydna
    password: luckydna
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  jwt:
    secret: change-this-to-a-long-random-secret-key-at-least-256-bits
    expiration-ms: 86400000

info:
  app:
    name: LuckyDNA API
    company: The Snell AI Group LLC
    version: 0.0.1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: when_authorized

  info:
    env:
      enabled: true